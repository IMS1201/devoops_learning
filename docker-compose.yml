# Basic-Full-Stack-App — EC2 / local Docker deployment
# Matches Kubernetes service ports used in YAML/ (6789 frontend, 7890 backend)

services:
  backend:
    build: ./backend
    image: raghuk8/backendapplication:local
    container_name: backend
    restart: unless-stopped
    ports:
      - "7890:8000"
    networks:
      - raghu-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_BASE: /
    image: raghuk8/frontend-application:local
    container_name: frontend
    restart: unless-stopped
    ports:
      - "6789:80"
    networks:
      - raghu-network
  nginx:
    image: nginx:latest
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/basic-full-stack-app.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - raghu-network

networks:
  raghu-network:
    driver: bridge