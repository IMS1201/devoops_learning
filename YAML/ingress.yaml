apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-example
  namespace: frontend-namespace  # 1. Keeps it in the same room as your services
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: "foo.bar1.com"
    http:
      paths:
      - pathType: Prefix
        path: "/bar1"
        backend:
          service:
            name: frontend-service
            port:
              number: 6789      # 2. Changed from NodePort 30765 to Service Port
      - pathType: Prefix
        path: "/bar"
        backend:
          service:
            name: backend-service
            port:
              number: 7890      # 2. Changed from NodePort 30368 to Service Port
  # Fallback for Minikube IP in browser (no Host header / no /etc/hosts)
  - http:
      paths:
      - pathType: Prefix
        path: "/bar1"
        backend:
          service:
            name: frontend-service
            port:
              number: 6789
      - pathType: Prefix
        path: "/bar"
        backend:
          service:
            name: backend-service
            port:
              number: 7890