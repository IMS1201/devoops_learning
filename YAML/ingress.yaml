apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress-example
  namespace: frontend-namespace  # 1. Keeps it in the same room as your services
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: "foo.bar1.com"
    http:
      paths:
      - pathType: Prefix
        path: "/bar1"
        backend:
          service:
            name: frontend-service
            port:
              number: 6789      # 2. Changed from NodePort 30765 to Service Port
      - pathType: Prefix
        path: "/bar"
        backend:
          service:
            name: backend-service
            port:
              number: 7890      # 2. Changed from NodePort 30368 to Service Port